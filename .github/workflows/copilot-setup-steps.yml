name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Pin Copilot model
        run: |
          echo "COPILOT_MODEL=sweagent-capi:gpt-5.3-codex" >> "$GITHUB_ENV"
          echo "COPILOT_FALLBACK_MODEL=sweagent-capi:gpt-5.3-codex" >> "$GITHUB_ENV"
      - name: Verify model pin
        run: |
          test "$COPILOT_MODEL" = "sweagent-capi:gpt-5.3-codex"
          test "$COPILOT_FALLBACK_MODEL" = "sweagent-capi:gpt-5.3-codex"
